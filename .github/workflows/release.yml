name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: dotnet publish --configuration Release --no-restore --output ./publish

      - name: Zip plugin release
        run: |
          mkdir -p package/shaedyHudManager
          cp publish/shaedyHudManager.dll package/shaedyHudManager/
          if [ -f publish/shaedyHudManager.pdb ]; then cp publish/shaedyHudManager.pdb package/shaedyHudManager/; fi
          cd package
          zip -r ../shaedyHudManager-plugin.zip shaedyHudManager

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: shaedyHudManager-plugin.zip
          generate_release_notes: false
