name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: dotnet publish --configuration Release --no-restore --output ./publish

      - name: Create shared artifact
        run: |
          mkdir -p ./shared-artifact
          cp ./publish/shaedyHudManager.dll ./shared-artifact/

      - name: Zip plugin release
        run: |
          cd publish
          zip -r ../shaedyHudManager-plugin.zip .

      - name: Zip shared library
        run: |
          cd shared-artifact
          zip -r ../shaedyHudManager-shared.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            shaedyHudManager-plugin.zip
            shaedyHudManager-shared.zip
          generate_release_notes: false
